<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <style>
        :root {
            color-scheme: light;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4f7fb;
            color: #162033;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #f4f7fb 0%, #ebf1f8 100%);
        }

        .page {
            max-width: 1120px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        .hero {
            margin-bottom: 24px;
            padding: 24px;
            border-radius: 16px;
            background: #162033;
            color: #f8fbff;
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        .hero p {
            margin: 0;
            color: #d0dae8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }

        .card {
            padding: 20px;
            border-radius: 14px;
            background: #ffffff;
            border: 1px solid #d9e2ef;
            box-shadow: 0 8px 24px rgba(22, 32, 51, 0.06);
        }

        .card-wide {
            grid-column: 1 / -1;
        }

        .card h2 {
            margin: 0 0 12px;
            font-size: 1.05rem;
        }

        .metric {
            margin: 0 0 8px;
            font-size: 0.96rem;
        }

        .label {
            display: inline-block;
            min-width: 140px;
            color: #5b6b82;
        }

        .placeholder {
            margin: 0;
            color: #5b6b82;
        }

        .table-wrap {
            overflow-x: auto;
            margin-top: 16px;
        }

        .jobs-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.92rem;
        }

        .jobs-table th,
        .jobs-table td {
            padding: 10px 12px;
            text-align: left;
            vertical-align: top;
            border-top: 1px solid #d9e2ef;
        }

        .jobs-table th {
            color: #5b6b82;
            background: #f8fbff;
            border-top: none;
        }
    </style>
</head>
<body>
    <main class="page">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
